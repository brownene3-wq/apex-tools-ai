<!DOCTYPE html>
<html lang="en"><head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset Password · Apex Tools AI</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  navy: { 50:'#f0f4f9', 100:'#dbe5f1', 600:'#1e3a5f', 700:'#172a4a', 800:'#0f1e36', 900:'#0a1628', 950:'#050b18' },
  accent: { 400:'#fb923c', 500:'#f97316', 600:'#ea580c' },
}, fontFamily: { sans: ['Inter','sans-serif'], display: ['Plus Jakarta Sans','sans-serif'] } } } };
</script>
<style>body{font-family:Inter,sans-serif} .font-display{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}</style>
  <link rel="icon" type="image/png" href="/apex-logo.png">
  <link rel="shortcut icon" type="image/png" href="/apex-logo.png">
  <link rel="apple-touch-icon" href="/apex-logo.png">
</head>
<body class="bg-navy-50/30 min-h-screen flex flex-col">

<header class="border-b border-navy-100 bg-white">
  <div class="max-w-7xl mx-auto px-4 lg:px-8 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/apex-logo-dark.png" alt="Apex Tools AI" class="w-9 h-9">
      <div class="font-display font-bold text-xl text-navy-900">Apex Tools <span class="text-accent-500">AI</span></div>
    </a>
    <a href="/login.html" class="text-sm text-navy-600 hover:text-navy-900 inline-flex items-center gap-1.5"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to sign in</a>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl border border-navy-100 shadow-xl p-8 lg:p-10">

      <div id="formPane">
        <div class="text-center mb-6">
          <h1 class="font-display text-2xl font-extrabold text-navy-900 mb-1">Choose a new password</h1>
          <p class="text-navy-600 text-sm">Pick a password you don't use anywhere else.</p>
        </div>
        <form id="resetForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">New password <span class="text-navy-400 font-normal">(min 8 characters)</span></label>
            <input id="pw1" type="password" required minlength="8" autocomplete="new-password"
              class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">Confirm password</label>
            <input id="pw2" type="password" required minlength="8" autocomplete="new-password"
              class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <button type="submit" id="submitBtn" class="w-full bg-accent-500 hover:bg-accent-600 text-white font-semibold py-3 rounded-xl transition-all">Reset Password</button>
        </form>
        <div id="errMsg" class="hidden mt-5 bg-red-50 border border-red-200 rounded-xl p-3 text-sm text-red-800"></div>
      </div>

      <div id="badTokenPane" class="hidden text-center">
        <div class="w-14 h-14 mx-auto mb-4 rounded-full bg-red-100 flex items-center justify-center"><i data-lucide="alert-triangle" class="w-7 h-7 text-red-600"></i></div>
        <h1 class="font-display text-2xl font-extrabold text-navy-900 mb-2">Invalid reset link</h1>
        <p class="text-navy-600 text-sm mb-6">This password reset link is missing or invalid.</p>
        <a href="/login.html" class="inline-block bg-navy-900 hover:bg-navy-800 text-white font-semibold px-6 py-3 rounded-xl">Back to sign in</a>
      </div>

    </div>
  </div>
</main>

<script>
lucide.createIcons();
const $ = id => document.getElementById(id);
const params = new URLSearchParams(location.search);
const token = params.get('token');
if (!token) {
  $('formPane').classList.add('hidden');
  $('badTokenPane').classList.remove('hidden');
  lucide.createIcons();
}

$('resetForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  $('errMsg').classList.add('hidden');
  const pw1 = $('pw1').value;
  const pw2 = $('pw2').value;
  if (pw1 !== pw2) {
    $('errMsg').textContent = 'Passwords do not match.';
    $('errMsg').classList.remove('hidden');
    return;
  }
  $('submitBtn').disabled = true; $('submitBtn').textContent = 'Resetting...';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw1 }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Reset failed');
    window.location.href = data.redirect || '/dashboard/';
  } catch (err) {
    $('errMsg').textContent = err.message;
    $('errMsg').classList.remove('hidden');
    $('submitBtn').disabled = false; $('submitBtn').textContent = 'Reset Password';
  }
});
</script>
<script src="/chatbot.js?v=20260519c" defer></script>
</body></html>
