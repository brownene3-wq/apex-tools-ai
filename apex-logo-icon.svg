<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0c1024"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9b3d"/>
      <stop offset="100%" stop-color="#ff6b1a"/>
    </linearGradient>
    <radialGradient id="dot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb35c"/>
      <stop offset="100%" stop-color="#ff6b1a"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dotglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark glass pill background with subtle highlight -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Subtle inner highlight (top) for glass effect -->
  <rect x="4" y="4" width="56" height="20" rx="12" fill="rgba(255,255,255,0.04)"/>

  <!-- Neon orange phone-call icon, centered -->
  <g filter="url(#glow)" transform="translate(14 13)">
    <!-- phone handset (Lucide phone-call style) -->
    <path d="M22.94 17.86c-.51 0-1.02-.07-1.51-.21l-.06-.02c-.5-.16-1.04-.41-1.62-.78-1.39-.86-3.16-2.4-5.42-4.66-2.26-2.26-3.8-4.03-4.66-5.42-.37-.58-.62-1.12-.78-1.62l-.02-.06c-.14-.49-.21-1-.21-1.51 0-.94.33-1.71.99-2.32C10.32 1.3 11.31.6 12.59.16c.85-.3 1.77-.13 2.46.46.7.59 1.45 1.66 2.04 2.64.55.91.41 2.07-.33 2.83l-.7.72c-.04.04-.04.09-.02.13.55 1.16 1.39 2.41 2.49 3.71 1.09 1.27 2.31 2.41 3.61 3.39.05.04.11.04.14.01l.65-.65c.74-.74 1.92-.89 2.83-.34.9.55 1.83 1.33 2.77 2.31.7.74.81 1.86.27 2.71-.71 1.12-1.61 2.07-2.66 2.83-.55.4-1.21.61-1.9.61z" 
          fill="url(#phone)" 
          transform="scale(1.1) translate(-3 -2)"/>
    <!-- signal waves -->
    <path d="M28 8c-1.5 0-2.7-1.2-2.7-2.7" stroke="url(#phone)" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M33 8c0-3.9-3.1-7-7-7" stroke="url(#phone)" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Orange notification dot, top-right -->
  <circle cx="52" cy="12" r="6" fill="url(#dot)" filter="url(#dotglow)"/>
  <circle cx="52" cy="12" r="6" fill="none" stroke="rgba(255,107,26,0.4)" stroke-width="1"/>
</svg>
