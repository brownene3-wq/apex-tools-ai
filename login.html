<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In · Apex Tools AI</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script>
tailwind.config = { theme: { extend: { colors: {
  navy: { 50:'#f0f4f9', 100:'#dbe5f1', 600:'#1e3a5f', 700:'#172a4a', 800:'#0f1e36', 900:'#0a1628', 950:'#050b18' },
  accent: { 400:'#fb923c', 500:'#f97316', 600:'#ea580c' },
}, fontFamily: { sans: ['Inter','sans-serif'], display: ['Plus Jakarta Sans','sans-serif'] } } } };
</script>
<style>body{font-family:Inter,sans-serif} .font-display{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-0.02em}
.tab-active{background:#0a1628;color:white}</style>
</head>
<body class="bg-navy-50/30 min-h-screen flex flex-col">

<header class="border-b border-navy-100 bg-white">
  <div class="max-w-7xl mx-auto px-4 lg:px-8 h-16 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2.5">
      <div class="w-9 h-9 bg-navy-900 rounded-lg flex items-center justify-center"><i data-lucide="phone-call" class="w-5 h-5 text-accent-500"></i></div>
      <div class="font-display font-bold text-xl text-navy-900">Apex Tools <span class="text-accent-500">AI</span></div>
    </a>
    <a href="/" class="text-sm text-navy-600 hover:text-navy-900 inline-flex items-center gap-1.5"><i data-lucide="arrow-left" class="w-4 h-4"></i> Back to site</a>
  </div>
</header>

<main class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl border border-navy-100 shadow-xl p-8 lg:p-10">

      <!-- Tab toggle -->
      <div class="flex gap-1 bg-navy-50 rounded-full p-1 mb-8 text-sm font-semibold">
        <button data-tab="signin" class="tab tab-active flex-1 py-2 rounded-full transition-all">Sign In</button>
        <button data-tab="signup" class="tab flex-1 py-2 rounded-full transition-all">Create Account</button>
      </div>

      <!-- SIGN IN -->
      <div id="pane-signin" class="pane">
        <div class="text-center mb-6">
          <h1 class="font-display text-2xl font-extrabold text-navy-900 mb-1">Welcome back</h1>
          <p class="text-navy-600 text-sm">Sign in to your dashboard</p>
        </div>
        <form id="signinForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">Email</label>
            <input id="siEmail" type="email" required autocomplete="email" placeholder="you@yourpractice.com"
              class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label class="block text-sm font-semibold text-navy-700">Password</label>
              <button type="button" id="forgotBtn" class="text-xs text-accent-600 hover:underline font-medium">Forgot password?</button>
            </div>
            <input id="siPw" type="password" required autocomplete="current-password"
              class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <button type="submit" id="siSubmit" class="w-full bg-navy-900 hover:bg-navy-800 text-white font-semibold py-3 rounded-xl transition-all">Sign In</button>
        </form>
      </div>

      <!-- SIGN UP -->
      <div id="pane-signup" class="pane hidden">
        <div class="text-center mb-6">
          <h1 class="font-display text-2xl font-extrabold text-navy-900 mb-1">Create your account</h1>
          <p class="text-navy-600 text-sm">Start managing your AI receptionist</p>
        </div>
        <form id="signupForm" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">Full Name</label>
            <input id="suName" type="text" required autocomplete="name" class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">Business Name <span class="text-navy-400 font-normal">(optional)</span></label>
            <input id="suBiz" type="text" autocomplete="organization" placeholder="Hollywood Smile Dental" class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text-navy-700 mb-1.5">Email</label>
            <input id="suEmail" type="email" required autocomplete="email" class="w-full px-4 py-3 border border-navy-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500">
          </div>
          <div>
            <label class="block text-sm font-semibold text
